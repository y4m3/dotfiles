# AeroSpace Configuration
# Path: ~/.aerospace.toml

config-version = 2

after-startup-command = ['exec-and-forget sketchybar']

exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"

on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
automatically-unhide-macos-hidden-apps = false
on-mode-changed = []

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = '(コピー|移動|情報|Copy|Move|Info)'
run = 'layout floating'

[key-mapping]
preset = "qwerty"

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.bottom = 5
outer.top = 5
outer.right = 5

[mode.main.binding]
# Layout controls
# Minimal re-tiling controls (avoid GlazeWM key conflicts)
alt-a = "join-with down"
alt-f = "fullscreen"
alt-m = "macos-native-minimize"
alt-n = "focus --ignore-floating --boundaries workspace --boundaries-action wrap-around-the-workspace dfs-next"
alt-b = "focus-back-and-forth"
alt-s = "join-with right"
alt-t = "layout tiling floating"
alt-comma = "layout tiles accordion"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"

# Focus movement
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"
alt-left = "focus left"
alt-down = "focus down"
alt-up = "focus up"
alt-right = "focus right"

# Window movement
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-shift-left = "move left"
alt-shift-down = "move down"
alt-shift-up = "move up"
alt-shift-right = "move right"

# Workspace navigation (GlazeWM-like: Alt+i / Alt+o / Alt+d)
alt-i = "workspace --wrap-around prev"
alt-o = "workspace --wrap-around next"
alt-d = "workspace-back-and-forth"

# Workspace direct jump
alt-0 = "workspace 0"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move window to workspace, then follow it
alt-shift-0 = ["move-node-to-workspace 0", "workspace 0"]
alt-shift-1 = ["move-node-to-workspace 1", "workspace 1"]
alt-shift-2 = ["move-node-to-workspace 2", "workspace 2"]
alt-shift-3 = ["move-node-to-workspace 3", "workspace 3"]
alt-shift-4 = ["move-node-to-workspace 4", "workspace 4"]
alt-shift-5 = ["move-node-to-workspace 5", "workspace 5"]
alt-shift-6 = ["move-node-to-workspace 6", "workspace 6"]
alt-shift-7 = ["move-node-to-workspace 7", "workspace 7"]
alt-shift-8 = ["move-node-to-workspace 8", "workspace 8"]
alt-shift-9 = ["move-node-to-workspace 9", "workspace 9"]

# Move workspace between monitors (Alt+Shift+a/s/d/f)
alt-shift-a = "move-workspace-to-monitor --wrap-around left"
alt-shift-s = "move-workspace-to-monitor --wrap-around down"
alt-shift-d = "move-workspace-to-monitor --wrap-around up"
alt-shift-f = "move-workspace-to-monitor --wrap-around right"

# Resize mode
alt-r = "mode resize"

# Window close
alt-shift-x = "close"

# WM control-ish actions
alt-shift-r = "reload-config"
alt-shift-w = "flatten-workspace-tree"
alt-shift-p = "enable toggle"

[workspace-to-monitor-force-assignment]
5 = 'secondary'

[mode.resize.binding]
h = "resize width -10"
j = "resize height -10"
k = "resize height +10"
l = "resize width +10"
left = "resize width -10"
down = "resize height -10"
up = "resize height +10"
right = "resize width +10"
esc = "mode main"
enter = "mode main"
