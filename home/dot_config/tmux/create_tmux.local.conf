# tmux Local Configuration
#
# Machine-specific overrides. This file is created once by chezmoi
# and never updated afterwards — edit freely.
#
# Settings here override the defaults because this file is
# sourced last in tmux.conf (later settings win).

# --- Prefix Key ---
# unbind C-a
# set -g prefix C-space
# bind C-space send-prefix

# --- Appearance ---
# source-file ~/.config/tmux/themes/catppuccin.conf
# set -g status-position bottom

# --- Font / Terminal ---
# set -ga terminal-overrides ",*:Tc"
